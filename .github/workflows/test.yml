name: Workspace Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  workspace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y z3

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check dependency policy
        run: cargo deny check

      - name: Run CI verification
        run: cargo xtask verify ci

  solver-backends:
    runs-on: ubuntu-latest
    env:
      CVC5_VERSION: 1.3.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y z3

      - name: Install cvc5
        run: |
          curl -fsSL -o /tmp/cvc5.zip "https://github.com/cvc5/cvc5/releases/download/cvc5-${CVC5_VERSION}/cvc5-Linux-x86_64-static.zip"
          unzip -q /tmp/cvc5.zip -d /tmp
          sudo install -m 0755 "/tmp/cvc5-Linux-x86_64-static/bin/cvc5" /usr/local/bin/cvc5

      - name: Run solver backend verification
        run: cargo xtask verify solver-backends

  msrv:
    name: MSRV Rust 1.88
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@1.88

      - name: Check workspace with MSRV
        run: cargo +1.88 check --workspace --all-targets --locked
