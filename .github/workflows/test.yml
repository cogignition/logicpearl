name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  workspace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y z3

      - name: Run workspace tests
        run: cargo test --manifest-path Cargo.toml --workspace

      - name: Check publish readiness
        run: python3 scripts/release/check_publish_ready.py
