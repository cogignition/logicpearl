name: Release Bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Z3 on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y z3

      - name: Install Z3 on macOS
        if: runner.os == 'macOS'
        run: brew install z3

      - name: Build release CLI
        run: cargo build --release -p logicpearl

      - name: Package release bundle
        shell: bash
        run: |
          cargo xtask package-release-bundle \
            --logicpearl-binary target/release/logicpearl \
            --z3-binary "$(command -v z3)" \
            --target-triple "${{ matrix.target }}" \
            --output-dir dist

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: logicpearl-${{ matrix.target }}
          path: |
            dist/logicpearl-${{ matrix.target }}.tar.gz
            dist/logicpearl-${{ matrix.target }}.tar.gz.sha256

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: bundle
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download packaged bundles
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: logicpearl-*
          merge-multiple: true

      - name: Generate Homebrew formula
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cargo xtask generate-homebrew-formula \
            --version "$VERSION" \
            --dist-dir dist \
            --output dist/logicpearl.rb

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/logicpearl.rb
          fail_on_unmatched_files: true

      - name: Publish Homebrew tap formula
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/LogicPearlHQ/homebrew-tap.git" homebrew-tap
          mkdir -p homebrew-tap/Formula
          cp dist/logicpearl.rb homebrew-tap/Formula/logicpearl.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/logicpearl.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula already up to date."
            exit 0
          fi
          git commit -m "logicpearl ${GITHUB_REF_NAME}"
          git push
