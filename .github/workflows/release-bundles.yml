name: Release Bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Z3 on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y z3

      - name: Install Z3 on macOS
        if: runner.os == 'macOS'
        run: brew install z3

      - name: Build release CLI
        run: cargo build --release -p logicpearl

      - name: Package release bundle
        shell: bash
        run: |
          cargo xtask package-release-bundle \
            --logicpearl-binary target/release/logicpearl \
            --z3-binary "$(command -v z3)" \
            --target-triple "${{ matrix.target }}" \
            --output-dir dist

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: logicpearl-${{ matrix.target }}
          path: |
            dist/logicpearl-${{ matrix.target }}.tar.gz
            dist/logicpearl-${{ matrix.target }}.tar.gz.sha256

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: bundle

    steps:
      - name: Download packaged bundles
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: logicpearl-*
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          fail_on_unmatched_files: true
