[advisories]
vulnerability = "deny"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

[[licenses.clarify]]
name = "r-efi"
expression = "MIT"
license-files = [{ path = "LICENSE-MIT", hash = 0 }]

[bans]
multiple-versions = "warn"
