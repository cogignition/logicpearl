version: "1"
id: "jailbreakbench"
description: "Adapt normalized JailbreakBench behavior rows into allow or deny benchmark cases."
source_format: "JSON array or JSONL with prompt/label/category rows normalized from JBB-Behaviors"
default_route: "mixed"

source:
  parser: "json-object-rows"
  prompt_fields:
    - "prompt"
  id_fields:
    - "id"
  category_fields:
    - "category"
  label_fields:
    - "label"
  input_fields:
    - source: "behavior"
      target: "behavior"
    - source: "source"
      target: "behavior_source"
    - source: "split"
      target: "benchmark_split"

output:
  id_prefix: "jailbreakbench"
  boolean_label_routes:
    true_route: "deny"
    false_route: "allow"
  default_category: "prompt_injection"
  static_input:
    document_instructions_present: false
