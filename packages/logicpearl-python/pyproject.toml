[build-system]
requires = ["maturin>=1.7,<2"]
build-backend = "maturin"

[project]
name = "logicpearl"
version = "0.1.5"
description = "Official Python bindings for logicpearl-engine."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
  { name = "LogicPearl" }
]
keywords = ["logicpearl", "rules", "policy", "decisioning"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Rust",
  "Topic :: Software Development :: Libraries"
]

[project.urls]
Homepage = "https://logicpearl.com"
Repository = "https://github.com/LogicPearlHQ/logicpearl"

[tool.maturin]
module-name = "logicpearl._logicpearl"
python-source = "src"
features = ["extension-module"]
