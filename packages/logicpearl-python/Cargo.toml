[package]
name = "logicpearl-python"
version = "0.1.6"
edition = "2021"
license = "MIT"
description = "Python bindings for logicpearl-engine."
homepage = "https://logicpearl.com"
repository = "https://github.com/LogicPearlHQ/logicpearl"

[workspace]

[features]
default = []
extension-module = ["pyo3/extension-module"]

[lib]
name = "_logicpearl"
crate-type = ["cdylib"]
path = "rust-src/lib.rs"

[dependencies]
logicpearl-core = { version = "0.1.6", path = "../../crates/logicpearl-core" }
logicpearl-engine = { version = "0.1.6", path = "../../crates/logicpearl-engine" }
pyo3 = { version = "0.24", features = ["abi3-py39", "auto-initialize"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
